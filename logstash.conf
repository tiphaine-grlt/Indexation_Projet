input {
  kafka {
    bootstrap_servers => "kafka:29092"
    topics => ["meteo_api"]
    codec => json
  }
}

filter {
  # 1) Assurer un @timestamp correct
  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # 2) Transformer meteo_hour en date Elasticsearch
  date {
    match => ["meteo_hour", "yyyy-MM-dd'T'HH:mm"]
    target => "meteo_hour"
  }

  # 3) Créer un champ texte pratique pour les requêtes textuelles/ngram/fuzzy
  mutate {
    add_field => {
      "search_text" => "%{city} %{source}"
    }
  }

  # 4) Convertir les types float et geo_point
  mutate {
    convert => {
      "temperature_2m" => "float"
      "precipitation" => "float"
      "wind_speed_10m" => "float"
      "[location][lat]" => "float"
      "[location][lon]" => "float"
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "meteo-%{+YYYY.MM.dd}"
  }
  # debug utile
  stdout { codec => rubydebug }
}
