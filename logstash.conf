input {
  kafka {
    bootstrap_servers => "kafka:29092"
    topics => ["meteo_api"]
    codec => json
  }
}

filter {
  # 1) Assurer un @timestamp correct (sinon Kibana time series galère)
  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # 2) Créer un champ texte pratique pour les requêtes textuelles/ngram/fuzzy
  #    (car la météo a peu de "texte" naturellement)
  mutate {
    add_field => {
      "search_text" => "%{city} %{source}"
    }
  }

  # 3) Optionnel: convertir les types (float) si nécessaire
  mutate {
    convert => {
      "temperature_2m" => "float"
      "precipitation" => "float"
      "wind_speed_10m" => "float"
      "[location][lat]" => "float"
      "[location][lon]" => "float"
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "meteo-%{+YYYY.MM.dd}"
  }
  # utile pour debug
  stdout { codec => rubydebug }
}
